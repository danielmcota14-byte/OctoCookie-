[build]
  publish = "public"
  functions = "netlify/functions"
[build.environment]
  SECRETS_SCAN_ENABLED = "false"
[functions]
  node_bundler = "esbuild"

# Rotas da API do Trader Bot + MoonPay → função unificada
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/api/api/:splat"
  status = 200
  force  = true

# Rota de health legada
[[redirects]]
  from   = "/health"
  to     = "/.netlify/functions/api/health"
  status = 200
  force  = true

# Webhooks MoonPay
[[redirects]]
  from   = "/api/moonpay-webhook"
  to     = "/.netlify/functions/api/api/moonpay-webhook"
  status = 200
  force  = true

# Callback OAuth da Deriv
[[redirects]]
  from   = "/callback"
  to     = "/callback.html"
  status = 200
  force  = true

# SPA fallback
[[redirects]]
  from   = "/*"
  to     = "/octocookie.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin  = "*"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, X-Requested-With, moonpay-signature"
