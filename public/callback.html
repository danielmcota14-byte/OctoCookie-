<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Autenticando...</title>
  <style>
    body { background: #060606; color: #f0f0f0; font-family: monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .msg { text-align: center; }
    .spinner { width: 32px; height: 32px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #7fff7f; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="msg">
    <div class="spinner"></div>
    <div>Autenticando com Deriv...</div>
  </div>
  <script>
    // Repassa os params do OAuth para a página principal
    const params = window.location.search;
    window.location.replace('/octocookie.html' + params);
  </script>
</body>
</html>
